<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Astralis Legacy - Participe</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        main {
            flex: 1;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

        <a class="navbar-brand font-weight-bold" href="index.html">
            <i class="fas fa-star text-danger mr-2"></i>Astralis Legacy
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#menuPrincipal">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">

            <ul class="navbar-nav ml-auto">

                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

                <li class="nav-item"><a class="nav-link" href="conquistas.html">Majors</a></li>

                <li class="nav-item active"><a class="nav-link" href="inscricao.html">Inscreva-se</a></li>

            </ul>

        </div>

    </nav>

    <main>

        <div class="container my-5">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="card shadow border-0">

                        <div class="card-header bg-dark text-white text-center py-3">

                            <h3 class="mb-0">Junte-se à Legião Astralis</h3>

                        </div>

                        <div class="card-body p-4">

                            <form>

                                <div class="form-row">

                                    <div class="form-group col-md-6">

                                        <label for="inputNome">Nome Completo</label>

                                        <div class="input-group">

                                            <div class="input-group-prepend">

                                                <span class="input-group-text">
                                                    <i class="fas fa-user"></i>
                                                </span>

                                            </div>

                                            <input type="text" class="form-control" placeholder="Ex: João Silva"
                                                required>

                                        </div>

                                    </div>

                                    <div class="form-group col-md-6">

                                        <label for="inputEmail">E-mail</label>

                                        <div class="input-group">

                                            <div class="input-group-prepend">

                                                <span class="input-group-text">
                                                    <i class="fas fa-envelope"></i>
                                                </span>

                                            </div>

                                            <input type="email" class="form-control" placeholder="email@email.com"
                                                required>

                                        </div>

                                    </div>

                                </div>

                                <div class="form-group">

                                    <label>Sua Pontuação no CS2</label>

                                    <select class="custom-select">

                                        <option selected disabled>Escolha seu rating</option>

                                        <option>Cinza (0 - 4.999)</option>

                                        <option>Azul Claro (5.000 - 9.999)</option>

                                        <option>Azul Escuro (10.000 - 14.999)</option>

                                        <option>Roxo (15.000 - 19.999)</option>

                                        <option>Rosa (20.000 - 24.999)</option>

                                        <option>Vermelho (25.000 - 29.999)</option>

                                        <option>Dourado (30.000+)</option>

                                    </select>

                                </div>

                                <div class="form-group">

                                    <label>
                                        Qual jogador da Astralis você mais admira?
                                    </label>

                                    <textarea class="form-control" rows="3"
                                        placeholder="device, gla1ve, dupreeh, Magisk, Xyp9x...">
</textarea>

                                </div>

                                <div class="custom-control custom-checkbox mb-4">

                                    <input type="checkbox" class="custom-control-input" id="checkTermos" required>

                                    <label class="custom-control-label" for="checkTermos">

                                        Aceito apoiar a Astralis e respeitar a comunidade competitiva de Counter-Strike.

                                    </label>

                                </div>

                                <button type="submit" class="btn btn-danger btn-lg btn-block">

                                    <i class="fas fa-paper-plane mr-2"></i>

                                    Entrar no Astralis Legacy

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <footer class="bg-dark text-light text-center py-4 mt-5">

        <p class="mb-0">
            © 2026 Astralis Legacy - Fã Clube <br>
            <small class="text-muted">Fã Clube não oficial | Trilha Bootstrap 4.6</small>
        </p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
